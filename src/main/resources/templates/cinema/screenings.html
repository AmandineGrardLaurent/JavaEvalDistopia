<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout}"
>
  <head>
    <title>Liste des séances</title>
  </head>

  <body>
    <div layout:fragment="content">
      <section>
        <article th:each="movie : ${screeningsByMovie}">
          <!-- movie title -->
          <h2 th:text="${movie.key.title}"></h2>

          <!-- movie description -->
          <p th:text="${movie.key.description}"></p>

          <!-- screenings dates -->
          <ul>
            <li th:each="screening : ${movie.value}">
              <span th:text="${screening.date}"></span>
            </li>
          </ul>
        </article>
      </section>
    </div>
  </body>
</html>
