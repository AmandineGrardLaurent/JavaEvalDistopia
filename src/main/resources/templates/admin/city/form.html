<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout}"
>
  <head>
    <title>Formulaire ville</title>
  </head>

  <body>
    <div layout:fragment="content" class="max-w-xl mx-auto space-y-6">
      <!-- Title -->
      <h1 class="text-2xl font-semibold text-cinemaAccent">
        <span
          th:text="${city.id == null} ? 'Ajouter une ville' : 'Modifier la ville'"
        ></span>
      </h1>

      <!-- Form -->
      <form
        th:action="@{/admin/city/save}"
        method="post"
        th:object="${city}"
        class="bg-cinemaCard border border-white/10 rounded-lg p-6 space-y-4"
      >
        <!-- id -->
        <input type="hidden" th:field="*{id}" />

        <!-- Name -->
        <div>
          <label class="text-sm text-cinemaSoft">Nom de la ville</label>
          <input
            id="name"
            type="text"
            th:field="*{name}"
            placeholder="Avignon, Toulouse..."
            class="w-full mt-1 px-3 py-2 bg-cinemaBg border border-white/10 rounded text-white focus:outline-none focus:border-cinemaAccent"
          />
          <p class="text-red-400 text-sm" th:errors="*{name}"></p>
        </div>

        <!-- Zipcode -->
        <div>
          <label class="text-sm text-cinemaSoft">Code postal</label>
          <input
            id="zipcode"
            type="text"
            th:field="*{zipcode}"
            placeholder="84000, 31000..."
            class="w-full mt-1 px-3 py-2 bg-cinemaBg border border-white/10 rounded text-white focus:outline-none focus:border-cinemaAccent"
          />
          <p class="text-red-400 text-sm" th:errors="*{zipcode}"></p>
        </div>

        <!-- Button -->
        <button
          type="submit"
          class="w-full py-2 bg-cinemaAccent rounded hover:opacity-90 transition text-white font-medium"
          th:text="${city.id == null} ? 'Enregistrer' : 'Modifier'"
        ></button>
      </form>
    </div>
  </body>
</html>
