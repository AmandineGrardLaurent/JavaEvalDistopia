<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout}"
>
  <head>
    <title>Admin - Villes</title>
  </head>

  <body>
    <div layout:fragment="content" class="space-y-6">
      <section class="flex items-center justify-between">
        <h1 class="text-2xl font-semibold text-cinemaAccent">
          Gestion des villes
        </h1>

        <a
          th:href="@{/admin/city/form}"
          class="px-4 py-2 bg-cinemaAccent rounded hover:opacity-90 transition text-white"
        >
          + Ajouter une ville
        </a>
      </section>

      <!-- City list -->
      <section class="grid gap-3">
        <article
          th:each="city : ${cities}"
          class="bg-cinemaCard border border-white/10 rounded-lg p-4 flex justify-between items-center"
        >
          <!-- Infos -->
          <div>
            <p class="text-white font-medium" th:text="${city.name}"></p>

            <p class="text-cinemaSoft text-sm" th:text="${city.zipcode}"></p>
          </div>

          <div class="flex gap-4 text-sm">
            
            <!-- Update -->
            <a
              th:href="@{/admin/city/form(id=${city.id})}"
              class="text-cinemaSoft hover:text-white transition"
            >
              Modifier
            </a>

            <!-- Delete -->
            <a
              th:href="@{/admin/city/delete(id=${city.id})}"
              class="text-red-400 hover:text-red-300 transition"
            >
              Supprimer
            </a>
          </div>
        </article>
      </section>
    </div>
  </body>
</html>
