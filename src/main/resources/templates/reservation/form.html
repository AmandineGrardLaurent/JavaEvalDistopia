<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout}"
>
  <head>
    <title>Réservation</title>
  </head>

  <body>
    <div layout:fragment="content" class="max-w-md mx-auto space-y-6">
      <!-- Titre -->
      <h1 class="text-2xl font-semibold text-cinemaAccent text-center">
        Réserver une séance
      </h1>

      <!-- Form -->
      <form
        th:action="@{/screening/reservation/save}"
        method="post"
        th:object="${reservation}"
        class="bg-cinemaCard border border-white/10 rounded-lg p-6 space-y-4"
      >
        <!-- Screening -->
        <input type="hidden" th:field="*{screening.id}" />

        <!-- Seats -->
        <div>
          <label class="text-sm text-cinemaSoft">Nombre de places</label>

          <input
            type="number"
            min="1"
            th:field="*{seats}"
            class="w-full mt-1 px-3 py-2 bg-cinemaBg border border-white/10 rounded text-white"
          />

          <!-- Error message -->
          <p class="text-red-400 text-sm" th:errors="*{seats}"></p>
        </div>

        <!-- Button -->
        <button
          type="submit"
          class="w-full py-2 bg-cinemaAccent rounded text-white"
        >
          Confirmer la réservation
        </button>
      </form>
    </div>
  </body>
</html>
